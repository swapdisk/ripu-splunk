---
- name: Play with EC2 and controller bits
  hosts: all
  strategy: free
  gather_facts: true
  become: true
  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:

    - name: Get services
      ansible.builtin.service_facts:

    - name: Gather EC2 metadata facts
      amazon.aws.ec2_metadata_facts:
      delegate_to: localhost
      become: false
      ignore_errors: true
      when: ansible_system_vendor == "Amazon EC2" or ansible_system_vendor == "Xen"

    - name: Dump all execpt local 
      ansible.builtin.debug:
        var: "{{ ansible_facts | ansible.builtin.combine({'ansible_local': {}}) }}"

    - name: Dump all facts
      ansible.builtin.debug:
        var: ansible_facts

