---
- name: Play with EC2 and controller bits
  hosts: all
  strategy: free
  gather_facts: true
  become: true
  tasks:
    - name: Debug job id
      ansible.builtin.debug:
        msg: "{{ awx_job_id | default('undefined') }}"

    - name: Dump awx facts
      ansible.builtin.debug:
        var: awx_facts
